version: '3.8'

services:
  team-server:
    build: ./team-server
    container_name: team-server
    environment:
      DATABASE_URL: sqlite:///./commands.db
      DEBUG: ${DEBUG:-False}
    ports:
      - "8000:8000"
    volumes:
      - ./team-server:/app
    networks:
      - c2_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  console:
    build: ./console
    container_name: console
    ports:
      - "5173:5173"
    networks:
      - c2_network

networks:
  c2_network:
    driver: bridge
