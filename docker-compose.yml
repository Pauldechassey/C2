version: '3.8'

services:
  app:
    build: .
    container_name: team-server
    environment:
      DATABASE_URL: sqlite:///./app.db
      DEBUG: ${DEBUG:-False}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - teamserver_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

networks:
  teamserver_network:
    driver: bridge
